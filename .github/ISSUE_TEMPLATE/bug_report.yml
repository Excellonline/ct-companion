name: Bug report
description: Report a reproducible problem in CardTrove Companion.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this. Please remove any private customer or credential data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the issue in a sentence or two.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone reproduce it?
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Multiple
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "0.1.10+11"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant logs or screenshots, with secrets removed.
