name: cardtrove_companion
description: Shared CardTrove team notes, todos, chat, and pipeline companion.
publish_to: 'none'
version: 0.1.10+11

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7

  flutter_riverpod: ^2.6.1

  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  file_picker: ^8.1.6
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^8.1.1

  http: ^1.2.2
  image: ^4.8.0
  intl: ^0.20.1
  uuid: ^4.5.1
  auto_updater: ^1.0.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
